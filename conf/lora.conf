##############################################################
#                                                            #
#          Configuration file for LoRa APRS                 #
#          Used with Dire Wolf                               #
#                                                            #
##############################################################
#
# This file is the companion to direwolf.conf for LoRa APRS operation.
# Place it in the same directory as direwolf.conf (usually ~/lora.conf).
#
# Dire Wolf handles all APRS processing: iGate, digipeating, beaconing,
# and packet decoding.  This file configures only the LoRa hardware and
# the connection between the LoRa bridge and Dire Wolf.
#
# The lora_kiss_bridge.py script reads this file on startup.
# Start the bridge before starting Dire Wolf.
#
# Questions?  https://groups.io/g/direwolf
#
##############################################################


##############################################################
#                                                            #
#  HARDWARE PROFILE                                          #
#                                                            #
##############################################################
#
# Select the hardware profile matching your LoRa module.
# Profiles are defined in hardware_profiles.yaml, installed
# alongside lora_kiss_bridge.py.
#
# Available profiles:
#   meshadv        MeshAdv-Pi Hat (Ebyte E22-900M30S, SX1262)
#   e22_900m30s    Ebyte E22-900M30S standalone breakout (SX1262)
#   e22_400m30s    Ebyte E22-400M30S standalone breakout (SX1268)
#   ebyte_e22      Generic Ebyte E22 breakout (SX1262)
#   lorapi_rfm95w  Digital Concepts LoRa-Pi (RFM95W/RFM98W, SX1276)
#   generic_sx1276 Generic SX1276/SX1278 breakout (Ra-02, etc.)
#   ttgo_uart      TTGO/Heltec over USB-UART KISS TNC
#

HARDWARE  meshadv


##############################################################
#                                                            #
#  RF PARAMETERS                                             #
#                                                            #
##############################################################
#
# These settings must match all other stations you want to
# communicate with.  The defaults below are the worldwide
# LoRa APRS standard.
#

# Frequency in MHz.
# 433.775  Region 1 (Europe, Africa, Middle East) and Region 3 (Asia-Pacific)
# 915.000  Region 2 (Americas) - experimental, check local regulations
#
LORAFREQ  433.775

# Bandwidth in kHz.  Standard LoRa APRS uses 125 kHz.
#
LORABW  125

# Spreading factor 7-12.  SF12 gives maximum range at lowest data rate.
# Most LoRa APRS networks use SF12.
#
LORASF  12

# Coding rate denominator (5 = 4/5, 6 = 4/6, etc.).
#
LORACR  5

# Sync word.  0x12 is the LoRa APRS / private network sync word.
# Do not change unless you know what you are doing.
#
LORASW  0x12

# Transmit power in dBm.
# Keep within your hardware limit and local regulations.
# Most modules support up to 17-22 dBm; see hardware_profiles.yaml.
#
LORATXPOWER  17


##############################################################
#                                                            #
#  CONNECTION TO DIRE WOLF                                   #
#                                                            #
##############################################################
#
# The bridge connects to Dire Wolf's LORAPORT TCP listener.
# Add the matching LORAPORT line to your direwolf.conf:
#
#   LORAPORT 8002
#
# The channel number assigned by Dire Wolf is used in
# direwolf.conf for IGCHAN, DIGIPEATER, PBEACON, etc.
#

KISSHOST  127.0.0.1
KISSPORT  8002
